<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GymTracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#F7F9F7; --bg2:#FFFFFF; --bg3:#F0F4F0; --bg4:#E2E8E2;
  --yellow:#3DCB54; --ydim:rgba(61,203,84,0.12);
  --white:#16201A; --gray:#7A8580; --gray2:#B8C2BB;
  --green:#3DCB54; --red:#F87171;
  --r:16px; --rs:10px;
  --shadow:0 1px 3px rgba(20,30,20,0.06), 0 1px 2px rgba(20,30,20,0.04);
}
body { background:var(--bg); color:var(--white); font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif; min-height:100vh; padding-bottom:72px; overflow-x:hidden; }

/* NAV */
.nav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--bg4); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -2px 12px rgba(20,30,20,0.06); }
.nav-btn { flex:1; padding:10px 4px 8px; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--gray2); transition:color .15s; }
.nav-btn.active { color:var(--yellow); }
.nav-btn svg { width:22px; height:22px; }
.nav-btn span { font-size:10px; font-weight:600; letter-spacing:.3px; }

/* PAGES */
.page { display:none; padding:16px; }
.page.active { display:block; }
.page-header { margin-bottom:20px; }
.page-header h1 { font-size:26px; font-weight:700; letter-spacing:-.5px; }
.page-header h1 span { color:var(--yellow); }
.page-header p { font-size:13px; color:var(--gray); margin-top:2px; }

/* CARDS */
.card { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }

/* MOUNTAIN BG */
.mountain-bg {
  position: relative;
  background: linear-gradient(180deg, #DCEFE0 0%, #EAFBEC 55%, #F7F9F7 100%);
  overflow: hidden;
}
.mountain-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 120% 60% at 50% 100%, rgba(247,249,247,0.95) 0%, transparent 60%),
    linear-gradient(180deg, transparent 0%, rgba(247,249,247,0.4) 100%);
  z-index: 2;
}
.mountain-bg .mtn-svg {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
  z-index: 1; opacity: 0.9;
}
.mountain-bg-content { position: relative; z-index: 3; }

/* HOME — next workout card */
.next-card { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); overflow:hidden; margin-bottom:16px; box-shadow:var(--shadow); }
.next-card-top { padding:20px; position:relative; overflow:hidden; border-bottom:1px solid var(--bg4); }
.next-label { font-size:11px; font-weight:600; color:var(--yellow); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.next-title { font-size:22px; font-weight:700; }
.next-sub { font-size:13px; color:var(--gray); margin-top:4px; }
.start-btn { display:block; width:calc(100% - 32px); margin:16px; padding:16px; background:var(--yellow); color:#fff; border:none; border-radius:var(--rs); font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.3px; transition:opacity .15s; box-shadow:0 4px 14px rgba(61,203,84,0.35); }
.start-btn:active { opacity:.85; }

/* TIMER BAR */
.timer-bar { border-radius:var(--r); border:1px solid var(--bg4); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
.timer-left { display:flex; align-items:center; gap:10px; }
.timer-dot { width:8px; height:8px; border-radius:50%; background:var(--gray2); flex-shrink:0; }
.timer-dot.running { background:var(--green); animation:pulse 1.2s infinite; }
.timer-dot.paused { background:var(--yellow); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.timer-label { font-size:11px; color:var(--gray); }
.timer-display { font-size:24px; font-weight:700; letter-spacing:1px; font-variant-numeric:tabular-nums; color:var(--white); }
.timer-display.running { color:var(--yellow); }
.timer-controls { display:flex; gap:8px; }
.tbtn { padding:7px 14px; border-radius:40px; border:1px solid var(--bg4); background:var(--bg4); color:var(--white); font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
.tbtn.primary { background:var(--yellow); color:#fff; border-color:var(--yellow); }
.tbtn:active { opacity:.75; }

/* DAY CARD */
.day-card { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); overflow:hidden; margin-bottom:12px; box-shadow:var(--shadow); }
.day-card-header { padding:14px 16px; border-bottom:1px solid var(--bg4); display:flex; align-items:center; justify-content:space-between; }
.day-card-title { font-size:16px; font-weight:700; }
.day-card-sub { font-size:12px; color:var(--gray); margin-top:2px; }

/* EXERCISE */
.exercise-row { padding:14px 16px; border-bottom:1px solid var(--bg3); display:flex; align-items:flex-start; gap:14px; }
.exercise-row:last-child { border-bottom:none; }
.ex-check { width:24px; height:24px; border-radius:6px; border:2px solid var(--bg4); background:none; cursor:pointer; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.ex-check.done { background:var(--yellow); border-color:var(--yellow); }
.ex-check.done::after { content:''; width:6px; height:10px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); display:block; }
.ex-info { flex:1; min-width:0; }
.ex-name { font-size:14px; font-weight:500; transition:color .15s; }
.ex-name.done { color:var(--gray2); text-decoration:line-through; }
.ex-meta { font-size:12px; color:var(--gray); margin-top:3px; }
.ex-weight-wrap { display:flex; align-items:center; gap:6px; margin-top:8px; }
.ex-weight-label { font-size:11px; color:var(--gray); }
.weight-control { display:flex; align-items:center; background:var(--bg3); border-radius:var(--rs); border:1px solid var(--bg4); overflow:hidden; }
.weight-btn { width:32px; height:30px; background:none; border:none; color:var(--yellow); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.weight-btn:active { background:var(--bg4); }
.weight-val { min-width:44px; text-align:center; font-size:13px; font-weight:600; }
.weight-unit { font-size:11px; color:var(--gray); }

/* FEELING */
.section-label { font-size:11px; font-weight:600; color:var(--gray); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; margin-top:16px; }
.feeling-row { display:flex; gap:8px; flex-wrap:wrap; }
.feeling-btn { padding:8px 14px; border-radius:40px; border:1px solid var(--bg4); background:var(--bg3); font-size:13px; cursor:pointer; color:var(--white); transition:all .15s; }
.feeling-btn.selected { background:var(--ydim); border-color:var(--yellow); color:var(--yellow); }
.notes-input { width:100%; background:var(--bg3); border:1px solid var(--bg4); border-radius:var(--rs); color:var(--white); font-size:13px; padding:10px 12px; resize:none; margin-top:10px; min-height:70px; font-family:inherit; }
.notes-input::placeholder { color:var(--gray2); }
.notes-input:focus { outline:none; border-color:var(--yellow); }

.finish-btn { width:100%; padding:16px; background:var(--yellow); color:#fff; border:none; border-radius:var(--r); font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; transition:opacity .15s; letter-spacing:.3px; box-shadow:0 4px 14px rgba(61,203,84,0.3); }
.finish-btn:active { opacity:.85; }

/* STATS */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-card { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); padding:14px 16px; box-shadow:var(--shadow); }
.stat-val { font-size:28px; font-weight:700; color:var(--yellow); line-height:1; }
.stat-label { font-size:11px; color:var(--gray); margin-top:4px; text-transform:uppercase; letter-spacing:.5px; }
.chart-wrap { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
.chart-title { font-size:13px; font-weight:600; color:var(--gray); text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }
.chart-container { position:relative; height:160px; }
.ex-select { width:100%; background:var(--bg3); border:1px solid var(--bg4); border-radius:var(--rs); color:var(--white); font-size:13px; padding:9px 12px; margin-bottom:14px; appearance:none; }
.ex-select:focus { outline:none; border-color:var(--yellow); }

/* HISTORY */
.history-item { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); cursor:pointer; }
.history-item-header { display:flex; align-items:center; justify-content:space-between; }
.history-date { font-size:13px; font-weight:600; }
.history-day { font-size:12px; color:var(--gray); margin-top:2px; }
.history-badge { font-size:11px; font-weight:600; padding:4px 10px; border-radius:40px; background:var(--ydim); color:var(--yellow); }
.history-stats { display:flex; gap:16px; margin-top:10px; padding-top:10px; border-top:1px solid var(--bg3); flex-wrap:wrap; }
.history-stat { font-size:12px; color:var(--gray); }
.history-stat strong { color:var(--white); font-size:13px; display:block; }

/* EMPTY */
.empty-state { text-align:center; padding:48px 24px; color:var(--gray); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state h3 { font-size:16px; font-weight:600; color:var(--white); margin-bottom:6px; }

/* CALENDAR */
.cal-month { margin-bottom:24px; }
.cal-month-title { font-size:15px; font-weight:700; color:var(--white); margin-bottom:10px; padding:0 2px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow { text-align:center; font-size:10px; font-weight:600; color:var(--gray2); padding:4px 0 6px; }
.cal-day {
  aspect-ratio:1; border-radius:8px; border:1px solid transparent;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:all .15s;
  font-size:12px; font-weight:500; color:var(--gray);
  background:var(--bg2);
}
.cal-day:active { opacity:.7; }
.cal-day.empty { background:none; border-color:transparent; cursor:default; }
.cal-day.today { border-color:var(--yellow); color:var(--yellow); font-weight:700; }
.cal-day.has-workout { background:var(--bg3); color:var(--white); }
.cal-day.has-workout::after { content:''; position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--yellow); }
.cal-day.has-note::before { content:''; position:absolute; top:4px; right:4px; width:4px; height:4px; border-radius:50%; background:var(--gray); }
.cal-day.has-note.has-workout::before { background:var(--green); }
.cal-day-workout-badge { font-size:8px; font-weight:700; color:var(--yellow); line-height:1; margin-top:1px; }
.cal-legend { display:flex; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
.cal-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gray); }
.cal-legend-dot { width:6px; height:6px; border-radius:50%; }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--yellow); color:#fff; padding:10px 20px; border-radius:40px; font-size:13px; font-weight:700; opacity:0; transition:all .25s; z-index:999; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* DONE STATE */
.done-card { background:var(--bg2); border-radius:var(--r); border:1px solid var(--bg4); padding:24px; text-align:center; margin-bottom:12px; box-shadow:var(--shadow); }
.done-icon { font-size:48px; margin-bottom:12px; }
.done-title { font-size:20px; font-weight:700; margin-bottom:6px; }
.done-sub { font-size:13px; color:var(--gray); margin-bottom:20px; }
.done-stats { display:flex; justify-content:center; gap:24px; margin-bottom:20px; }
.done-stat { text-align:center; }
.done-stat-val { font-size:22px; font-weight:700; color:var(--yellow); }
.done-stat-label { font-size:11px; color:var(--gray); margin-top:2px; }
.new-workout-btn { width:100%; padding:14px; background:var(--bg3); color:var(--white); border:1px solid var(--bg4); border-radius:var(--rs); font-size:14px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>

<div id="page-today" class="page active">
  <div class="page-header">
    <h1>Gym<span>Tracker</span></h1>
    <p id="today-date"></p>
  </div>
  <div id="today-content"></div>
</div>

<div id="page-progress" class="page">
  <div class="page-header">
    <h1>Прогресс<span>.</span></h1>
    <p>Твои результаты и рост</p>
  </div>
  <div id="progress-content"></div>
</div>

<div id="page-history" class="page">
  <div class="page-header">
    <h1>История<span>.</span></h1>
    <p>Все тренировки</p>
  </div>
  <div id="history-content"></div>
</div>

<div id="page-calendar" class="page">
  <div class="page-header">
    <h1>Дневник<span>.</span></h1>
    <p>Тренировки и заметки</p>
  </div>
  <div id="calendar-content"></div>
</div>

<!-- DAY MODAL -->
<div id="day-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);align-items:flex-end;">
  <div style="background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--bg4);padding:20px 16px 40px;width:100%;max-height:85vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div id="modal-date-title" style="font-size:18px;font-weight:700;"></div>
      <button onclick="closeModal()" style="background:var(--bg3);border:none;color:var(--gray);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">×</button>
    </div>
    <div id="modal-workout-info" style="margin-bottom:12px;"></div>
    <div style="font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">Заметка на день</div>
    <textarea id="modal-note-input" placeholder="Напиши что угодно — самочувствие, питание, мысли..." style="width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;color:#fff;font-size:14px;padding:12px;min-height:100px;resize:none;font-family:inherit;" oninput="saveDayNote(this.value)"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button id="modal-voice-btn" onclick="toggleModalVoice()" style="width:44px;height:44px;border-radius:50%;border:1px solid var(--bg4);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button onclick="closeModal()" style="flex:1;padding:12px;background:var(--yellow);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;">Сохранить</button>
    </div>
  </div>
</div>

<!-- EXERCISE HISTORY MODAL -->
<div id="ex-history-modal" style="display:none;position:fixed;inset:0;z-index:210;background:rgba(20,30,20,0.5);align-items:flex-end;">
  <div style="background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--bg4);padding:20px 16px 40px;width:100%;max-height:75vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div id="ex-history-title" style="font-size:17px;font-weight:700;"></div>
      <button onclick="closeExHistory()" style="background:var(--bg3);border:none;color:var(--gray);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">×</button>
    </div>
    <div id="ex-history-content"></div>
  </div>
</div>

<!-- CANCEL WORKOUT CONFIRM MODAL -->
<div id="cancel-confirm-modal" style="display:none;position:fixed;inset:0;z-index:220;background:rgba(20,30,20,0.6);align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--bg2);border-radius:18px;padding:24px;width:100%;max-width:320px;text-align:center;box-shadow:0 10px 40px rgba(20,30,20,0.2);">
    <div style="font-size:32px;margin-bottom:10px;">⚠️</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:8px;">Отменить тренировку?</div>
    <div style="font-size:13px;color:var(--gray);margin-bottom:20px;line-height:1.5;">Весь прогресс этой тренировки будет потерян и не сохранится в истории.</div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeCancelConfirm()" style="flex:1;padding:13px;background:var(--bg3);color:var(--white);border:1px solid var(--bg4);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">Нет, продолжить</button>
      <button onclick="confirmCancelWorkout()" style="flex:1;padding:13px;background:#F87171;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;">Да, отменить</button>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Сегодня</span>
  </button>
  <button class="nav-btn" onclick="showPage('progress',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Прогресс</span>
  </button>
  <button class="nav-btn" onclick="showPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>История</span>
  </button>
  <button class="nav-btn" onclick="showPage('calendar',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Дневник</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const PLAN = [
  { id:'A', name:'Спина + Плечи', day:'Понедельник', muscles:'Широчайшие · Ромбовидные · Дельты',
    exercises:[
      {id:'a1',name:'Тяга верхнего блока широким хватом',sets:4,reps:'8–12',muscle:'широчайшие'},
      {id:'a2',name:'Горизонтальная тяга блока',sets:4,reps:'8–12',muscle:'ромбовидные, трапеции'},
      {id:'a3',name:'Тяга гантели в наклоне',sets:3,reps:'8–12',muscle:'широчайшие, бицепс'},
      {id:'a4',name:'Жим гантелей сидя',sets:4,reps:'8–12',muscle:'средние дельты'},
      {id:'a5',name:'Махи гантелями в стороны',sets:3,reps:'8–12',muscle:'средние дельты'},
      {id:'a6',name:'Тяга штанги к подбородку',sets:3,reps:'8–12',muscle:'трапеции, дельты'},
      {id:'a7',name:'Подъём штанги на бицепс',sets:3,reps:'8–12',muscle:'бицепс'},
      {id:'a8',name:'Сгибания запястий',sets:3,reps:'8–12',muscle:'предплечье'},
      {id:'a9',name:'Обратные сгибания запястий',sets:3,reps:'8–12',muscle:'предплечье'},
    ]
  },
  { id:'B', name:'Ноги', day:'Среда', muscles:'Квадрицепс · Бицепс бедра · Ягодицы',
    exercises:[
      {id:'b1',name:'Приседания со штангой / в Смите',sets:4,reps:'8–12',muscle:'квадрицепс, ягодицы'},
      {id:'b2',name:'Жим ногами в тренажёре',sets:4,reps:'8–12',muscle:'квадрицепс'},
      {id:'b3',name:'Выпады с гантелями',sets:3,reps:'8–12',muscle:'ягодицы, квадрицепс'},
      {id:'b4',name:'Сгибания ног в тренажёре',sets:3,reps:'8–12',muscle:'бицепс бедра'},

// ── STATE ──────────────────────────────────────────────
let state = { sessions:[], activeSession:null };
// activeSession: { dayId, startTs, done:{}, weights:{}, feeling:null, notes:'' }

const TG = window.Telegram && window.Telegram.WebApp;
const CS = TG && TG.CloudStorage;

function save() {
  const d = JSON.stringify(state);
  try { localStorage.setItem('gymtracker2', d); } catch(e){}
  if (CS) CS.setItem('gymtracker2', d);
}

function loadState(cb) {
  try {
    const l = localStorage.getItem('gymtracker2');
    if (l) state = JSON.parse(l);
    if (!state.sessions) state.sessions = [];
  } catch(e) { state = {sessions:[], activeSession:null}; }
  cb();
  if (CS) {
    CS.getItem('gymtracker2', (err, val) => {
      if (!err && val) {
        try {
          const cloud = JSON.parse(val);
          if (cloud.sessions && cloud.sessions.length >= state.sessions.length) {
            state = cloud;
            if (!state.sessions) state.sessions = [];
            try { localStorage.setItem('gymtracker2', val); } catch(e){}
            rerenderActive();
          }
        } catch(e){}
      } else if (!err) { save(); }
    });
  }
}

// ── TIMER (based on real timestamp) ──────────────────
function timerElapsed() {
  if (!state.activeSession || !state.activeSession.startTs) return 0;
  return Math.floor((Date.now() - state.activeSession.startTs) / 1000);
}

let timerInterval = null;
function startTimerTick() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    const el = document.getElementById('timer-display');
    if (el) { el.textContent = formatTimer(timerElapsed()); }
  }, 1000);
}
function stopTimerTick() { clearInterval(timerInterval); timerInterval = null; }

// Resume timer on visibility change (coming back from lock screen)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.activeSession && state.activeSession.startTs) {
    const el = document.getElementById('timer-display');
    if (el) el.textContent = formatTimer(timerElapsed());
  }
});

// ── HELPERS ───────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }

function formatTimer(secs) {
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  if (h>0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function formatDate(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
}

function nextDayId() {
  if (!state.sessions.length) return 'A';
  const last = state.sessions[state.sessions.length - 1].dayId;
  const idx = PLAN.findIndex(d => d.id === last);
  return PLAN[(idx + 1) % PLAN.length].id;
}

// ── NAVIGATION ────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  rerenderActive();
}

function rerenderActive() {
  const a = document.querySelector('.page.active');
  if (!a) return;
  if (a.id==='page-today') renderToday();
  if (a.id==='page-progress') renderProgress();
  if (a.id==='page-history') renderHistory();
  if (a.id==='page-calendar') renderCalendar();
}

// ── TODAY PAGE ────────────────────────────────────────
function renderToday() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});

  const container = document.getElementById('today-content');

  // Active workout in progress
  if (state.activeSession) {
    renderWorkout(container);
    return;
  }

  // Check if already finished today
  const todayFinished = state.sessions.find(s => s.date === today());
  if (todayFinished) {
    renderDoneState(container, todayFinished);
    return;
  }

  // Show next workout suggestion
  renderNextWorkout(container);
}

function nextWorkoutDate() {
  // Suggest next Mon/Wed/Fri from today
  const t = new Date();
  const dow = t.getDay(); // 0=Sun,1=Mon,...
  const targets = [1,3,5]; // Mon Wed Fri
  for (let i=0;i<7;i++) {
    const d = new Date(t); d.setDate(t.getDate()+i);
    if (targets.includes(d.getDay())) {
      return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',weekday:'short'});
    }
  }
  return '';
}

function renderNextWorkout(container) {
  stopTimerTick();
  const dayId = nextDayId();
  const day = PLAN.find(d => d.id === dayId);
  const total = state.sessions.length;
  const lastDate = total ? formatDate(state.sessions[total-1].date) : null;
  const nextDate = nextWorkoutDate();

  let html = `<div class="next-card">

      </svg>

      </div>
    </div>

  </div>`;

  if (lastDate) {
    html += `<div class="card" style="text-align:center;padding:14px;">
      <div style="font-size:12px;color:var(--gray);">Последняя тренировка</div>

    <div class="section-label">Или выбери другую:</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">`;
  PLAN.forEach(d => {
    if (d.id !== day.id) {
      html += `<button onclick="startWorkout('${d.id}')" style="padding:10px 18px;border-radius:40px;border:1px solid var(--bg4);background:var(--bg2);color:var(--white);font-size:13px;font-weight:600;cursor:pointer;">
        День ${d.id} — ${d.name}

function startWorkout(dayId) {
  state.activeSession = { dayId, startTs: Date.now(), done:{}, weights:{}, feeling:null, notes:'' };
  save();
  renderWorkout(document.getElementById('today-content'));
}

function renderWorkout(container) {
  const s = state.activeSession;

        <path d="M0,170 L80,110 L140,150 L200,90 L260,145 L330,100 L400,130 L400,200 L0,200 Z" fill="#8FCC9C" opacity="0.5"/>
        <path d="M0,190 L100,150 L180,175 L260,140 L400,170 L400,200 L0,200 Z" fill="#5FB873" opacity="0.45"/>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="timer-dot running" id="timer-dot"></div>
      <div>
        <div class="timer-label">Тренировка идёт</div>

  html += `<div class="day-card">
    <div class="day-card-header">
      <div>
        <div class="day-card-title">День ${day.id} — ${day.name}</div>
        <div class="day-card-sub">${day.muscles}</div>
      </div>
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="${r}" fill="none" stroke="#E2E8E2" stroke-width="3"/>
        <circle cx="22" cy="22" r="${r}" fill="none" stroke="#3DCB54" stroke-width="3"
          stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 22 22)"/>
        <text x="22" y="26" text-anchor="middle" fill="#3DCB54" font-size="10" font-weight="700" font-family="-apple-system,sans-serif">${pct}%</text>
      </svg>
    </div>`;

  day.exercises.forEach(ex => {
    const done = !!s.done[ex.id];
    const w = s.weights[ex.id] || 0;
    html += `<div class="exercise-row">
      <button class="ex-check ${done?'done':''}" onclick="toggleEx('${ex.id}')"></button>
      <div class="ex-info">
        <div class="ex-name ${done?'done':''}" onclick="openExerciseHistory('${ex.id}')" style="cursor:pointer;">${ex.name}${ex.muscle?' <span style="font-size:11px;color:var(--gray);font-weight:400;">('+ex.muscle+')</span>':''} <span style="color:var(--yellow);font-size:11px;">📊</span></div>
        <div class="ex-meta">${ex.sets} подх. × ${ex.reps} повт.</div>
        <div class="ex-weight-wrap">
          <span class="ex-weight-label">Вес:</span>
          <div class="weight-control">
            <button class="weight-btn" onclick="changeWeight('${ex.id}',-1)">−</button>
            <span class="weight-val" id="w-${ex.id}">${w}</span>
            <button class="weight-btn" onclick="changeWeight('${ex.id}',1)">+</button>
          </div>
          <span class="weight-unit">кг</span>

  ['😴 Устал','😐 Нормально','💪 Отлично','🔥 Огонь'].forEach(f => {
    html += `<button class="feeling-btn ${s.feeling===f?'selected':''}" onclick="setFeeling('${f}')">${f}</button>`;
  });
  html += `</div>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:flex-start;">

function renderDoneState(container, session) {
  stopTimerTick();
  const day = PLAN.find(d => d.id === session.dayId);
  const done = day.exercises.filter(e => session.done[e.id]).length;
  const dur = session.duration || 0;

  let html = `<div class="done-card">
    <div class="done-icon">✅</div>
    <div class="done-title">Тренировка завершена!</div>
    <div class="done-sub">День ${day.id} — ${day.name}</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-stat-val">${done}/${day.exercises.length}</div><div class="done-stat-label">упражнений</div></div>
      ${dur ? `<div class="done-stat"><div class="done-stat-val">${formatTimer(dur)}</div><div class="done-stat-label">время</div></div>` : ''}
      <div class="done-stat"><div class="done-stat-val">${session.feeling ? session.feeling.split(' ')[0] : '—'}</div><div class="done-stat-label">самочувствие</div></div>
    </div>
  </div>`;

  const nextId = nextDayId();
  const nextDay = PLAN.find(d => d.id === nextId);
  html += `<div class="card" style="padding:16px;">
    <div style="font-size:12px;color:var(--gray);margin-bottom:6px;">Следующая тренировка</div>
    <div style="font-size:15px;font-weight:700;">День ${nextDay.id} — ${nextDay.name}</div>
    <div style="font-size:12px;color:var(--gray);margin-top:2px;">${nextDay.muscles}</div>
  </div>`;

  container.innerHTML = html;
}

// ── EXERCISE ACTIONS ──────────────────────────────────
function toggleEx(exId) {
  state.activeSession.done[exId] = !state.activeSession.done[exId];
  save();
  renderWorkout(document.getElementById('today-content'));
}

function changeWeight(exId, delta) {
  const cur = state.activeSession.weights[exId] || 0;
  const val = Math.max(0, Math.round((cur+delta)*10)/10);
  state.activeSession.weights[exId] = val;
  save();
  const el = document.getElementById('w-'+exId);
  if (el) el.textContent = val;
}

function setFeeling(f) {
  state.activeSession.feeling = f;
  save();
  document.querySelectorAll('.feeling-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === f);
  });
}

function saveNotes(v) { state.activeSession.notes = v; save(); }

function finishWorkout() {
  const s = state.activeSession;
  const day = PLAN.find(d => d.id === s.dayId);
  const done = day.exercises.filter(e => s.done[e.id]).length;

  // Move active session to history
  const session = { ...s, date: today(), duration: timerElapsed() };
  state.sessions.push(session);
  state.activeSession = null;
  save();
  stopTimerTick();

  showToast(`✓ ${done}/${day.exercises.length} упражнений · ${formatTimer(session.duration)}`);
  renderToday();
}

// ── PROGRESS PAGE ─────────────────────────────────────
let progressChart = null;
function renderProgress() {
  const container = document.getElementById('progress-content');
  const total = state.sessions.length;
  const week = state.sessions.filter(s => (Date.now()-new Date(s.date+'T00:00:00'))/(864e5)<7).length;

  let streak = 0;
  const dates = [...new Set(state.sessions.map(s=>s.date))].sort().reverse();
  for (let i=0;i<dates.length;i++) {
    const exp = new Date(); exp.setDate(exp.getDate()-i);
    if (dates[i]===exp.toISOString().split('T')[0]) streak++; else break;
  }

  const avgDuration = total>0 ? Math.round(state.sessions.reduce((a,s)=>a+(s.duration||0),0)/total) : 0;

  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Всего тренировок</div></div>
    <div class="stat-card"><div class="stat-val">${week}</div><div class="stat-label">На этой неделе</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Дней подряд 🔥</div></div>
    <div class="stat-card"><div class="stat-val">${total>0?Math.round(state.sessions.reduce((a,s)=>{
      const d=PLAN.find(p=>p.id===s.dayId);
      return a+(d?Object.keys(s.done).filter(k=>s.done[k]).length:0);
    },0)/total):0}</div><div class="stat-label">Ср. упр. за трен.</div></div>
    <div class="stat-card" style="grid-column:span 2;"><div class="stat-val">${avgDuration?formatTimer(avgDuration):'—'}</div><div class="stat-label">Среднее время тренировки</div></div>
  </div>`;

  html += `<div class="chart-wrap">
    <div class="chart-title">Прогресс веса</div>
    <select class="ex-select" id="ex-select" onchange="updateWeightChart(this.value)">`;
  PLAN.forEach(day => day.exercises.forEach(ex => {
    html += `<option value="${ex.id}">${ex.name}</option>`;
  }));
  html += `</select><div class="chart-container"><canvas id="weightChart"></canvas></div></div>`;

  html += `<div class="chart-wrap">
    <div class="chart-title">Выполнение по дням</div>
    <div class="chart-container"><canvas id="completionChart"></canvas></div>
  </div>`;

  container.innerHTML = html;
  setTimeout(()=>{ updateWeightChart(document.getElementById('ex-select').value); drawCompletion(); }, 50);
}

function updateWeightChart(exId) {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  if (progressChart) { progressChart.destroy(); progressChart=null; }
  const sessions = state.sessions.filter(s=>s.weights&&s.weights[exId]>0).sort((a,b)=>a.date.localeCompare(b.date));
  progressChart = new Chart(canvas, {
    type:'line',
    data:{ labels:sessions.map(s=>formatDate(s.date)), datasets:[{ data:sessions.map(s=>s.weights[exId]), borderColor:'#3DCB54', backgroundColor:'rgba(61,203,84,0.08)', borderWidth:2, pointBackgroundColor:'#3DCB54', pointRadius:4, tension:.3, fill:true }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:'#7A8580',font:{size:10}},grid:{color:'#E2E8E2'}}, y:{ticks:{color:'#7A8580',font:{size:10},callback:v=>v+' кг'},grid:{color:'#E2E8E2'}} } }
  });
}

function drawCompletion() {
  const canvas = document.getElementById('completionChart');
  if (!canvas) return;
  const byDay = {A:0,B:0,C:0};
  state.sessions.forEach(s=>{ if(byDay[s.dayId]!==undefined) byDay[s.dayId]++; });
  new Chart(canvas, {
    type:'bar',
    data:{ labels:['А — Спина/Плечи','Б — Ноги','В — Трицепс/Плечи'], datasets:[{ data:[byDay.A,byDay.B,byDay.C], backgroundColor:['rgba(61,203,84,.8)','rgba(61,203,84,.5)','rgba(61,203,84,.3)'], borderRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:'#7A8580',font:{size:10}},grid:{display:false}}, y:{ticks:{color:'#7A8580',font:{size:10},stepSize:1},grid:{color:'#E2E8E2'}} } }
  });
}

// ── HISTORY PAGE ──────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('history-content');
  const sorted = [...state.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  if (!sorted.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏋️</div><h3>Пока нет тренировок</h3><p>Начни первую тренировку на главном экране</p></div>`;
    return;
  }
  let html = '';
  sorted.forEach(s => {
    const day = PLAN.find(d=>d.id===s.dayId);
    if (!day) return;
    const done = day.exercises.filter(e=>s.done[e.id]).length;
    const pct = Math.round(done/day.exercises.length*100);
    const vol = day.exercises.reduce((a,e)=>a+(s.weights&&s.weights[e.id]?s.weights[e.id]*e.sets:0),0);
    html += `<div class="history-item">
      <div class="history-item-header">
        <div><div class="history-date">${formatDate(s.date)}</div><div class="history-day">День ${s.dayId} — ${day.name}</div></div>
        <div class="history-badge">${pct}%</div>
      </div>
      <div class="history-stats">
        <div class="history-stat"><strong>${done}/${day.exercises.length}</strong>упражнений</div>
        <div class="history-stat"><strong>${vol>0?Math.round(vol)+' кг':'—'}</strong>объём</div>
        <div class="history-stat"><strong>${s.duration?formatTimer(s.duration):'—'}</strong>время</div>
        <div class="history-stat"><strong>${s.feeling?s.feeling.split(' ')[0]:'—'}</strong>самочувствие</div>
      </div>
      ${s.notes?`<div style="margin-top:8px;font-size:12px;color:#888;border-top:1px solid #1e1e1e;padding-top:8px;">${s.notes}</div>`:''}
    </div>`;
  });
  container.innerHTML = html;
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}


// ── VOICE INPUT ───────────────────────────────────────
let recognition = null;
let isListening = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Голосовой ввод не поддерживается');
    return;
  }
  if (isListening) { stopVoice(); return; }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ru-RU';
  recognition.continuous = true;
  recognition.interimResults = true;

  const btn = document.getElementById('voice-btn');
  const textarea = document.getElementById('notes-input');
  const base = textarea ? textarea.value : '';

  recognition.onstart = () => {
    isListening = true;
    if (btn) {
      btn.style.background = '#3DCB54';
      btn.style.borderColor = '#3DCB54';
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    }
    showToast('🎤 Говори...');
  };

  let accumulated = '';
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) accumulated += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    if (textarea) {
      const prefix = base && base.trim() && !base.endsWith(' ') ? base + ' ' : base;
      textarea.value = prefix + accumulated + interim;
      if (accumulated) saveNotes(textarea.value);
    }
  };

  recognition.onerror = (e) => {
    stopVoice();
    if (e.error !== 'aborted') showToast('Ошибка микрофона');
  };

  recognition.onend = () => { stopVoice(); };
  recognition.start();
}

function stopVoice() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  const btn = document.getElementById('voice-btn');
  if (btn) {
    btn.style.background = '';
    btn.style.borderColor = '';
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
  }
}


// ── CALENDAR PAGE ─────────────────────────────────────
let modalDate = null;
let modalRecognition = null;
let modalListening = false;

function renderCalendar() {
  const container = document.getElementById('calendar-content');
  const now = new Date();
  const todayStr = today();

  // Build day notes index and session index
  const notesByDate = state.dayNotes || {};
  const sessionsByDate = {};
  state.sessions.forEach(s => { sessionsByDate[s.date] = s; });

  const DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  let html = `<div class="cal-legend">
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--yellow)"></div>Тренировка</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>Заметка + тренировка</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--gray)"></div>Только заметка</div>
  </div>`;

  // Show 12 months from current month
  for (let m = 0; m < 12; m++) {
    const d = new Date(now.getFullYear(), now.getMonth() + m, 1);
    const year = d.getFullYear();
    const month = d.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    // Monday-based: getDay() returns 0=Sun, adjust
    let startDow = d.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // 0=Mon

    html += `<div class="cal-month"><div class="cal-month-title">${MONTHS[month]} ${year}</div><div class="cal-grid">`;
    DOW.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });

    // Empty cells before first day
    for (let i = 0; i < startDow; i++) html += '<div class="cal-day empty"></div>';

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isToday = dateStr === todayStr;
      const session = sessionsByDate[dateStr];
      const hasNote = !!notesByDate[dateStr];
      const isFuture = dateStr > todayStr;

      let cls = 'cal-day';
      if (isToday) cls += ' today';
      if (session) cls += ' has-workout';
      if (hasNote) cls += ' has-note';

      const badge = session ? `<div class="cal-day-workout-badge">${session.dayId}</div>` : '';
      const opacity = isFuture ? 'opacity:.4;' : '';

      html += `<div class="${cls}" style="${opacity}" onclick="openDayModal('${dateStr}')">
        ${day}${badge}
      </div>`;
    }
    html += '</div></div>';
  }

  container.innerHTML = html;
}

function openDayModal(dateStr) {
  modalDate = dateStr;
  const modal = document.getElementById('day-modal');
  const titleEl = document.getElementById('modal-date-title');
  const noteInput = document.getElementById('modal-note-input');
  const workoutInfo = document.getElementById('modal-workout-info');

  titleEl.textContent = formatDate(dateStr);

  // Show workout info if exists
  const session = state.sessions.find(s => s.date === dateStr);
  if (session) {
    const day = PLAN.find(d => d.id === session.dayId);
    const done = day.exercises.filter(e => session.done[e.id]).length;
    workoutInfo.innerHTML = `<div style="background:var(--bg3);border-radius:10px;padding:12px;border:1px solid var(--bg4);">
      <div style="font-size:11px;color:var(--yellow);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;">Тренировка</div>
      <div style="font-size:14px;font-weight:700;">День ${day.id} — ${day.name}</div>
      <div style="font-size:12px;color:var(--gray);margin-top:4px;">${done}/${day.exercises.length} упр. · ${session.duration ? formatTimer(session.duration) : '—'} · ${session.feeling || '—'}</div>
    </div>`;
  } else {
    workoutInfo.innerHTML = '';
  }

  // Load existing note
  if (!state.dayNotes) state.dayNotes = {};
  noteInput.value = state.dayNotes[dateStr] || '';

  modal.style.display = 'flex';
  setTimeout(() => noteInput.focus(), 100);
}

function closeModal() {
  if (modalListening) stopModalVoice();
  document.getElementById('day-modal').style.display = 'none';
  modalDate = null;
  renderCalendar();
}

function saveDayNote(val) {
  if (!modalDate) return;
  if (!state.dayNotes) state.dayNotes = {};
  if (val.trim()) state.dayNotes[modalDate] = val;
  else delete state.dayNotes[modalDate];
  save();
}

function toggleModalVoice() {
  if (modalListening) { stopModalVoice(); return; }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Голосовой ввод не поддерживается'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  modalRecognition = new SR();
  modalRecognition.lang = 'ru-RU';
  modalRecognition.continuous = true;
  modalRecognition.interimResults = true;

  const btn = document.getElementById('modal-voice-btn');
  const textarea = document.getElementById('modal-note-input');
  const base = textarea ? textarea.value : '';

  modalRecognition.onstart = () => {
    modalListening = true;
    if (btn) { btn.style.background='#3DCB54'; btn.style.borderColor='#3DCB54'; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>'; }
    showToast('🎤 Говори...');
  };
  let modalAccumulated = '';
  modalRecognition.onresult = (e) => {
    let interim = '';
    for (let i=e.resultIndex;i<e.results.length;i++) {
      if (e.results[i].isFinal) modalAccumulated += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    if (textarea) {
      const prefix = base && base.trim() && !base.endsWith(' ') ? base+' ' : base;
      textarea.value = prefix + modalAccumulated + interim;
      if (modalAccumulated) saveDayNote(textarea.value);
    }
  };
  modalRecognition.onerror = () => stopModalVoice();
  modalRecognition.onend = () => stopModalVoice();
  modalRecognition.start();
}

function stopModalVoice() {
  modalListening = false;
  if (modalRecognition) { try{modalRecognition.stop();}catch(e){} modalRecognition=null; }
  const btn = document.getElementById('modal-voice-btn');
  if (btn) { btn.style.background=''; btn.style.borderColor=''; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>'; }
}

// Close modal on backdrop click
document.getElementById('day-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});


// ── CANCEL WORKOUT CONFIRMATION ───────────────────────
function requestCancelWorkout() {
  document.getElementById('cancel-confirm-modal').style.display = 'flex';
}
function closeCancelConfirm() {
  document.getElementById('cancel-confirm-modal').style.display = 'none';
}
function confirmCancelWorkout() {
  state.activeSession = null;
  save();
  stopTimerTick();
  closeCancelConfirm();
  showToast('Тренировка отменена');
  renderToday();
}

// ── EXERCISE WEIGHT HISTORY ────────────────────────────
function openExerciseHistory(exId) {
  // Find exercise definition
  let exDef = null, parentDay = null;
  PLAN.forEach(d => { const f = d.exercises.find(e=>e.id===exId); if (f) { exDef = f; parentDay = d; } });
  if (!exDef) return;

  const modal = document.getElementById('ex-history-modal');
  const titleEl = document.getElementById('ex-history-title');
  const contentEl = document.getElementById('ex-history-content');

  titleEl.textContent = exDef.name;

  const past = state.sessions
    .filter(s => s.weights && s.weights[exId] > 0)
    .sort((a,b) => b.date.localeCompare(a.date));

  if (!past.length) {
    contentEl.innerHTML = `<div style="text-align:center;padding:30px 10px;color:var(--gray);">
      <div style="font-size:32px;margin-bottom:10px;">📊</div>
      <div style="font-size:13px;">Пока нет истории по этому упражнению</div>
    </div>`;
  } else {
    const maxW = Math.max(...past.map(s => s.weights[exId]));
    let html = `<div style="font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">Последние результаты</div>`;
    past.slice(0, 15).forEach(s => {
      const w = s.weights[exId];
      const isMax = w === maxW;
      html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3);">
        <div style="font-size:13px;color:var(--gray);">${formatDate(s.date)}</div>
        <div style="font-size:15px;font-weight:700;${isMax?'color:var(--yellow);':''}">${w} кг ${isMax?'🏆':''}</div>
      </div>`;
    });
    contentEl.innerHTML = html;
  }

  modal.style.display = 'flex';
}
function closeExHistory() {
  document.getElementById('ex-history-modal').style.display = 'none';
}
