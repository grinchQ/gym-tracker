<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GymTracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --bg2: #141414;
    --bg3: #1e1e1e;
    --bg4: #282828;
    --yellow: #FFD600;
    --yellow-dim: rgba(255,214,0,0.12);
    --yellow-dim2: rgba(255,214,0,0.06);
    --white: #FFFFFF;
    --gray: #888888;
    --gray2: #555555;
    --green: #4ADE80;
    --red: #F87171;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--bg4);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; padding: 10px 4px 8px;
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--gray2); transition: color 0.15s;
  }
  .nav-btn.active { color: var(--yellow); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* HEADER */
  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .page-header h1 span { color: var(--yellow); }
  .page-header p { font-size: 13px; color: var(--gray); margin-top: 2px; }

  /* CARDS */
  .card {
    background: var(--bg2);
    border-radius: var(--radius);
    border: 1px solid var(--bg4);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.8px; }

  /* DAY SELECTOR */
  .day-tabs {
    display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
    scrollbar-width: none; -ms-overflow-style: none;
    padding-bottom: 2px;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 40px;
    border: 1px solid var(--bg4);
    background: var(--bg2);
    color: var(--gray);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .day-tab.active {
    background: var(--yellow);
    color: #000;
    border-color: var(--yellow);
  }

  /* DAY CARD */
  .day-card {
    background: var(--bg2);
    border-radius: var(--radius);
    border: 1px solid var(--bg4);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .day-card-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--bg4);
    display: flex; align-items: center; justify-content: space-between;
  }
  .day-card-title { font-size: 16px; font-weight: 700; }
  .day-card-sub { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .day-progress-ring {
    width: 44px; height: 44px; flex-shrink: 0;
  }

  /* EXERCISE ROW */
  .exercise-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--bg3);
    display: flex; align-items: flex-start; gap: 14px;
  }
  .exercise-row:last-child { border-bottom: none; }

  .ex-check {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid var(--bg4);
    background: none; cursor: pointer;
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ex-check.done {
    background: var(--yellow);
    border-color: var(--yellow);
  }
  .ex-check.done::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid #000;
    border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: block;
  }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name {
    font-size: 14px; font-weight: 500;
    transition: color 0.15s;
  }
  .ex-name.done { color: var(--gray2); text-decoration: line-through; }
  .ex-meta { font-size: 12px; color: var(--gray); margin-top: 3px; }

  .ex-weight-wrap { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .ex-weight-label { font-size: 11px; color: var(--gray); }
  .weight-control {
    display: flex; align-items: center; gap: 0;
    background: var(--bg3); border-radius: var(--radius-sm);
    border: 1px solid var(--bg4); overflow: hidden;
  }
  .weight-btn {
    width: 30px; height: 28px;
    background: none; border: none; color: var(--yellow);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .weight-btn:active { background: var(--bg4); }
  .weight-val {
    min-width: 44px; text-align: center;
    font-size: 13px; font-weight: 600;
    color: var(--white);
  }
  .weight-unit { font-size: 11px; color: var(--gray); }

  /* FINISH BTN */
  .finish-btn {
    width: 100%; padding: 16px;
    background: var(--yellow); color: #000;
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
  }
  .finish-btn:active { opacity: 0.85; }

  /* FEELING */
  .feeling-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
  }
  .feeling-btn {
    padding: 8px 14px;
    border-radius: 40px;
    border: 1px solid var(--bg4);
    background: var(--bg3);
    font-size: 13px; cursor: pointer; color: var(--white);
    transition: all 0.15s;
  }
  .feeling-btn.selected {
    background: var(--yellow-dim);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .notes-input {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--bg4); border-radius: var(--radius-sm);
    color: var(--white); font-size: 13px; padding: 10px 12px;
    resize: none; margin-top: 10px; min-height: 70px;
    font-family: inherit;
  }
  .notes-input::placeholder { color: var(--gray2); }
  .notes-input:focus { outline: none; border-color: var(--yellow); }

  /* STATS PAGE */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--bg2); border-radius: var(--radius);
    border: 1px solid var(--bg4); padding: 14px 16px;
  }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--yellow); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--gray); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .chart-wrap {
    background: var(--bg2); border-radius: var(--radius);
    border: 1px solid var(--bg4); padding: 16px;
    margin-bottom: 12px;
  }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
  .chart-container { position: relative; height: 160px; }

  .ex-select {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--bg4); border-radius: var(--radius-sm);
    color: var(--white); font-size: 13px; padding: 9px 12px;
    margin-bottom: 14px; cursor: pointer;
    appearance: none;
  }
  .ex-select:focus { outline: none; border-color: var(--yellow); }

  /* HISTORY PAGE */
  .history-item {
    background: var(--bg2); border-radius: var(--radius);
    border: 1px solid var(--bg4); padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .history-item-header { display: flex; align-items: center; justify-content: space-between; }
  .history-date { font-size: 13px; font-weight: 600; }
  .history-day { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .history-badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 40px;
    background: var(--yellow-dim); color: var(--yellow);
  }
  .history-stats {
    display: flex; gap: 16px; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--bg3);
  }
  .history-stat { font-size: 12px; color: var(--gray); }
  .history-stat strong { color: var(--white); font-size: 13px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--gray);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--white); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.5; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--yellow); color: #000;
    padding: 10px 20px; border-radius: 40px;
    font-size: 13px; font-weight: 700;
    opacity: 0; transition: all 0.25s;
    z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 11px; font-weight: 600; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px; margin-top: 16px;
  }

  .streak-row {
    display: flex; gap: 6px; margin-top: 4px;
  }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--bg4);
  }
  .streak-dot.done { background: var(--yellow); }

  /* WORKOUT TIMER */
  .timer-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg2);
    border-bottom: 1px solid var(--bg4);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin: -16px -16px 16px -16px;
  }
  .timer-left { display: flex; align-items: center; gap: 10px; }
  .timer-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gray2); flex-shrink: 0;
    transition: background 0.3s;
  }
  .timer-dot.running { background: var(--green); animation: pulse 1.2s infinite; }
  .timer-dot.paused { background: var(--yellow); }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  .timer-label { font-size: 12px; color: var(--gray); }
  .timer-display {
    font-size: 22px; font-weight: 700; letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    color: var(--white);
  }
  .timer-display.running { color: var(--yellow); }
  .timer-controls { display: flex; gap: 8px; }
  .timer-btn {
    padding: 6px 14px; border-radius: 40px;
    border: 1px solid var(--bg4);
    background: var(--bg3); color: var(--white);
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .timer-btn.primary {
    background: var(--yellow); color: #000; border-color: var(--yellow);
  }
  .timer-btn:active { opacity: 0.75; }
</style>
</head>
<body>

<!-- PAGES -->
<div id="page-today" class="page active">
  <div class="page-header">
    <h1>Gym<span>Tracker</span></h1>
    <p id="today-date"></p>
  </div>
  <div id="today-content"></div>
</div>

<div id="page-progress" class="page">
  <div class="page-header">
    <h1>Прогресс<span>.</span></h1>
    <p>Твои результаты и рост</p>
  </div>
  <div id="progress-content"></div>
</div>

<div id="page-history" class="page">
  <div class="page-header">
    <h1>История<span>.</span></h1>
    <p>Все тренировки</p>
  </div>
  <div id="history-content"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('today', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Сегодня</span>
  </button>
  <button class="nav-btn" onclick="showPage('progress', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span>Прогресс</span>
  </button>
  <button class="nav-btn" onclick="showPage('history', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span>История</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const PLAN = [
  {
    id: 'A', name: 'Спина + Плечи', day: 'Понедельник',
    muscles: 'Широчайшие · Ромбовидные · Дельты',
    exercises: [
      { id: 'a1', name: 'Тяга верхнего блока', sets: 4, reps: '10–12' },
      { id: 'a2', name: 'Горизонтальная тяга блока', sets: 4, reps: '10–12' },
      { id: 'a3', name: 'Тяга гантели в наклоне', sets: 3, reps: '12' },
      { id: 'a4', name: 'Жим гантелей сидя', sets: 4, reps: '10–12' },
      { id: 'a5', name: 'Махи гантелями в стороны', sets: 3, reps: '15' },
      { id: 'a6', name: 'Тяга штанги к подбородку', sets: 3, reps: '12' },
      { id: 'a7', name: 'Сгибания запястий', sets: 3, reps: '15–20' },
      { id: 'a8', name: 'Обратные сгибания запястий', sets: 3, reps: '15' },
    ]
  },
  {
    id: 'B', name: 'Ноги', day: 'Среда',
    muscles: 'Квадрицепс · Бицепс бедра · Ягодицы',
    exercises: [
      { id: 'b1', name: 'Приседания со штангой / в Смите', sets: 4, reps: '10–12' },
      { id: 'b2', name: 'Жим ногами в тренажёре', sets: 4, reps: '12' },
      { id: 'b3', name: 'Выпады с гантелями', sets: 3, reps: '10' },
      { id: 'b4', name: 'Сгибания ног в тренажёре', sets: 3, reps: '12' },
      { id: 'b5', name: 'Разгибания ног в тренажёре', sets: 3, reps: '12' },
      { id: 'b6', name: 'Подъём на носки', sets: 4, reps: '15' },
    ]
  },
  {
    id: 'C', name: 'Трицепс + Плечи', day: 'Пятница',
    muscles: 'Трицепс · Передние дельты · Средние дельты',
    exercises: [
      { id: 'c1', name: 'Жим штанги лёжа', sets: 4, reps: '10–12' },
      { id: 'c2', name: 'Жим гантелей на наклонной', sets: 3, reps: '12' },
      { id: 'c3', name: 'Разгибания на блоке (трицепс)', sets: 4, reps: '12–15' },
      { id: 'c4', name: 'Французский жим с гантелью', sets: 3, reps: '12' },
      { id: 'c5', name: 'Отжимания на брусьях', sets: 3, reps: '10–12' },
      { id: 'c6', name: 'Махи гантелями в стороны', sets: 3, reps: '15' },
    ]
  }
];

// STATE
let state = JSON.parse(localStorage.getItem('gymtracker') || '{}');
// state: { sessions: [{date, dayId, done:{exId:bool}, weights:{exId:kg}, feeling, notes}] }
if (!state.sessions) state.sessions = [];

let currentDayId = null;
let todaySession = null;
let progressChart = null;

// TIMER STATE
let timerSeconds = 0;
let timerInterval = null;
let timerRunning = false;
let timerStartedAt = null;

function save() { localStorage.setItem('gymtracker', JSON.stringify(state)); }

function today() { return new Date().toISOString().split('T')[0]; }

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
}

function getOrCreateSession(dayId) {
  const t = today();
  let s = state.sessions.find(s => s.date === t && s.dayId === dayId);
  if (!s) {
    s = { date: t, dayId, done: {}, weights: {}, feeling: null, notes: '' };
    state.sessions.push(s);
    save();
  }
  return s;
}

function getTodaySession() {
  const t = today();
  return state.sessions.find(s => s.date === t);
}

// NAVIGATION
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'progress') renderProgress();
  if (name === 'history') renderHistory();
}

// TIMER FUNCTIONS
function formatTimer(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerUI();
  }, 1000);
  updateTimerUI();
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  updateTimerUI();
}

function resetTimer() {
  pauseTimer();
  timerSeconds = 0;
  updateTimerUI();
}

function updateTimerUI() {
  const display = document.getElementById('timer-display');
  const dot = document.getElementById('timer-dot');
  const startBtn = document.getElementById('timer-start-btn');
  if (!display) return;
  display.textContent = formatTimer(timerSeconds);
  display.className = 'timer-display' + (timerRunning ? ' running' : '');
  if (dot) {
    dot.className = 'timer-dot' + (timerRunning ? ' running' : (timerSeconds > 0 ? ' paused' : ''));
  }
  if (startBtn) {
    startBtn.textContent = timerRunning ? 'Пауза' : (timerSeconds > 0 ? 'Продолжить' : 'Старт');
    startBtn.className = 'timer-btn' + (timerRunning ? '' : ' primary');
  }
}

function toggleTimer() {
  if (timerRunning) pauseTimer();
  else startTimer();
}

// TODAY PAGE
function renderToday() {
  const dateEl = document.getElementById('today-date');
  dateEl.textContent = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });

  if (!currentDayId) currentDayId = PLAN[0].id;

  const container = document.getElementById('today-content');
  const existing = getTodaySession();

  let html = `<div class="timer-bar">
    <div class="timer-left">
      <div class="timer-dot${timerRunning ? ' running' : (timerSeconds > 0 ? ' paused' : '')}" id="timer-dot"></div>
      <div>
        <div class="timer-label">Тренировка</div>
        <div class="timer-display${timerRunning ? ' running' : ''}" id="timer-display">${formatTimer(timerSeconds)}</div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="timer-btn${timerRunning ? '' : ' primary'}" id="timer-start-btn" onclick="toggleTimer()">${timerRunning ? 'Пауза' : (timerSeconds > 0 ? 'Продолжить' : 'Старт')}</button>
      <button class="timer-btn" onclick="resetTimer()">Сброс</button>
    </div>
  </div>`;

  html += '<div class="day-tabs">';
  PLAN.forEach(d => {
    html += `<button class="day-tab ${d.id === currentDayId ? 'active' : ''}" onclick="selectDay('${d.id}')">${d.id} — ${d.day}</button>`;
  });
  html += '</div>';

  const day = PLAN.find(d => d.id === currentDayId);
  todaySession = getOrCreateSession(currentDayId);

  const doneCount = day.exercises.filter(e => todaySession.done[e.id]).length;
  const total = day.exercises.length;
  const pct = Math.round(doneCount / total * 100);

  // Progress ring SVG
  const r = 16, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;

  html += `<div class="day-card">
    <div class="day-card-header">
      <div>
        <div class="day-card-title">${day.name}</div>
        <div class="day-card-sub">${day.muscles}</div>
      </div>
      <svg class="day-progress-ring" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="${r}" fill="none" stroke="#282828" stroke-width="3"/>
        <circle cx="22" cy="22" r="${r}" fill="none" stroke="#FFD600" stroke-width="3"
          stroke-dasharray="${dash.toFixed(1)} ${(circ - dash).toFixed(1)}"
          stroke-dashoffset="${(circ / 4).toFixed(1)}" stroke-linecap="round" transform="rotate(-90 22 22)"/>
        <text x="22" y="26" text-anchor="middle" fill="#FFD600" font-size="10" font-weight="700" font-family="-apple-system,sans-serif">${pct}%</text>
      </svg>
    </div>`;

  day.exercises.forEach(ex => {
    const done = !!todaySession.done[ex.id];
    const w = todaySession.weights[ex.id] || 0;
    html += `<div class="exercise-row">
      <button class="ex-check ${done ? 'done' : ''}" onclick="toggleEx('${ex.id}')"></button>
      <div class="ex-info">
        <div class="ex-name ${done ? 'done' : ''}">${ex.name}</div>
        <div class="ex-meta">${ex.sets} подх. × ${ex.reps} повт.</div>
        <div class="ex-weight-wrap">
          <span class="ex-weight-label">Вес:</span>
          <div class="weight-control">
            <button class="weight-btn" onclick="changeWeight('${ex.id}', -2.5)">−</button>
            <span class="weight-val" id="w-${ex.id}">${w}</span>
            <button class="weight-btn" onclick="changeWeight('${ex.id}', 2.5)">+</button>
          </div>
          <span class="weight-unit">кг</span>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';

  // Feeling & notes
  html += `<div class="section-label">Самочувствие после</div>
  <div class="card" style="padding:12px 14px;">
    <div class="feeling-row">`;
  ['😴 Устал', '😐 Нормально', '💪 Отлично', '🔥 Огонь'].forEach(f => {
    const sel = todaySession.feeling === f ? 'selected' : '';
    html += `<button class="feeling-btn ${sel}" onclick="setFeeling('${f}')">${f}</button>`;
  });
  html += `</div>
    <textarea class="notes-input" placeholder="Заметки о тренировке..." id="notes-input" onchange="saveNotes(this.value)">${todaySession.notes || ''}</textarea>
  </div>`;

  html += `<button class="finish-btn" onclick="finishWorkout()">Завершить тренировку ✓</button>`;

  container.innerHTML = html;
}

function selectDay(id) {
  currentDayId = id;
  renderToday();
}

function toggleEx(exId) {
  todaySession.done[exId] = !todaySession.done[exId];
  save();
  renderToday();
}

function changeWeight(exId, delta) {
  const cur = todaySession.weights[exId] || 0;
  const val = Math.max(0, Math.round((cur + delta) * 10) / 10);
  todaySession.weights[exId] = val;
  save();
  const el = document.getElementById('w-' + exId);
  if (el) el.textContent = val;
}

function setFeeling(f) {
  todaySession.feeling = f;
  save();
  document.querySelectorAll('.feeling-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === f);
  });
}

function saveNotes(v) {
  todaySession.notes = v;
  save();
}

function finishWorkout() {
  const day = PLAN.find(d => d.id === currentDayId);
  const done = day.exercises.filter(e => todaySession.done[e.id]).length;
  todaySession.duration = timerSeconds;
  save();
  pauseTimer();
  const timeStr = timerSeconds > 0 ? ` · ${formatTimer(timerSeconds)}` : '';
  showToast(`✓ ${done}/${day.exercises.length} упражнений${timeStr}`);
}

// PROGRESS PAGE
function renderProgress() {
  const container = document.getElementById('progress-content');

  const total = state.sessions.length;
  const thisWeek = state.sessions.filter(s => {
    const d = new Date(s.date + 'T00:00:00');
    const now = new Date();
    const diff = (now - d) / (1000 * 60 * 60 * 24);
    return diff < 7;
  }).length;

  // Streak
  let streak = 0;
  const sortedDates = [...new Set(state.sessions.map(s => s.date))].sort().reverse();
  const todayStr = today();
  for (let i = 0; i < sortedDates.length; i++) {
    const d = new Date(sortedDates[i] + 'T00:00:00');
    const expected = new Date();
    expected.setDate(expected.getDate() - i);
    const exp = expected.toISOString().split('T')[0];
    if (sortedDates[i] === exp) streak++;
    else break;
  }

  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Всего тренировок</div></div>
    <div class="stat-card"><div class="stat-val">${thisWeek}</div><div class="stat-label">На этой неделе</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Дней подряд 🔥</div></div>
    <div class="stat-card"><div class="stat-val">${total > 0 ? Math.round(state.sessions.reduce((a,s)=>{
      const day = PLAN.find(d=>d.id===s.dayId);
      return a + (day ? Object.keys(s.done).filter(k=>s.done[k]).length : 0);
    },0)/total) : 0}</div><div class="stat-label">Ср. упр. за трен.</div></div>
  </div>`;

  // Weight progress chart
  html += `<div class="chart-wrap">
    <div class="chart-title">Прогресс веса</div>
    <select class="ex-select" id="ex-select" onchange="updateChart(this.value)">`;

  PLAN.forEach(day => {
    day.exercises.forEach(ex => {
      html += `<option value="${ex.id}">${ex.name}</option>`;
    });
  });
  html += `</select>
    <div class="chart-container"><canvas id="weightChart"></canvas></div>
  </div>`;

  // Completion by day
  html += `<div class="chart-wrap">
    <div class="chart-title">Выполнение по дням</div>
    <div class="chart-container"><canvas id="completionChart"></canvas></div>
  </div>`;

  container.innerHTML = html;

  // Draw charts after DOM is ready
  setTimeout(() => {
    drawWeightChart(document.getElementById('ex-select').value);
    drawCompletionChart();
  }, 50);
}

function updateChart(exId) {
  drawWeightChart(exId);
}

function drawWeightChart(exId) {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  if (progressChart) { progressChart.destroy(); progressChart = null; }

  const sessions = state.sessions
    .filter(s => s.weights[exId] > 0)
    .sort((a, b) => a.date.localeCompare(b.date));

  const labels = sessions.map(s => formatDate(s.date));
  const data = sessions.map(s => s.weights[exId]);

  progressChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#FFD600',
        backgroundColor: 'rgba(255,214,0,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#FFD600',
        pointRadius: 4,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888', font: { size: 10 } }, grid: { color: '#1e1e1e' } },
        y: { ticks: { color: '#888', font: { size: 10 }, callback: v => v + ' кг' }, grid: { color: '#1e1e1e' } }
      }
    }
  });
}

function drawCompletionChart() {
  const canvas = document.getElementById('completionChart');
  if (!canvas) return;

  const byDay = { A: 0, B: 0, C: 0 };
  state.sessions.forEach(s => { if (byDay[s.dayId] !== undefined) byDay[s.dayId]++; });

  new Chart(canvas, {
    type: 'bar',
    data: {
      labels: ['А — Спина/Плечи', 'Б — Ноги', 'В — Трицепс/Плечи'],
      datasets: [{
        data: [byDay.A, byDay.B, byDay.C],
        backgroundColor: ['rgba(255,214,0,0.8)', 'rgba(255,214,0,0.5)', 'rgba(255,214,0,0.3)'],
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#888', font: { size: 10 }, stepSize: 1 }, grid: { color: '#1e1e1e' } }
      }
    }
  });
}

// HISTORY PAGE
function renderHistory() {
  const container = document.getElementById('history-content');
  const sorted = [...state.sessions].sort((a, b) => b.date.localeCompare(a.date));

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🏋️</div>
      <h3>Пока нет тренировок</h3>
      <p>Начни первую тренировку во вкладке «Сегодня»</p>
    </div>`;
    return;
  }

  let html = '';
  sorted.forEach(s => {
    const day = PLAN.find(d => d.id === s.dayId);
    if (!day) return;
    const done = day.exercises.filter(e => s.done[e.id]).length;
    const pct = Math.round(done / day.exercises.length * 100);
    const totalVol = day.exercises.reduce((acc, e) => acc + (s.weights[e.id] || 0) * e.sets, 0);

    html += `<div class="history-item">
      <div class="history-item-header">
        <div>
          <div class="history-date">${formatDate(s.date)}</div>
          <div class="history-day">День ${s.dayId} — ${day.name}</div>
        </div>
        <div class="history-badge">${pct}%</div>
      </div>
      <div class="history-stats">
        <div class="history-stat"><strong>${done}/${day.exercises.length}</strong><br>упражнений</div>
        <div class="history-stat"><strong>${totalVol > 0 ? Math.round(totalVol) + ' кг' : '—'}</strong><br>объём</div>
        <div class="history-stat"><strong>${s.duration ? formatTimer(s.duration) : '—'}</strong><br>время</div>
        <div class="history-stat"><strong>${s.feeling || '—'}</strong><br>самочувствие</div>
      </div>
      ${s.notes ? `<div style="margin-top:8px;font-size:12px;color:#888;border-top:1px solid #1e1e1e;padding-top:8px;">${s.notes}</div>` : ''}
    </div>`;
  });
  container.innerHTML = html;
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// TELEGRAM WebApp integration
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

// INIT
renderToday();
</script>
</body>
</html>
